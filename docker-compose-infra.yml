services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: wallai-zookeeper
    networks:
      - wallai-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: wallai-kafka
    networks:
      - wallai-net
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: wallai-zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://wallai-kafka:9092,EXTERNAL://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: wallai-kafka-ui
    networks:
      - wallai-net
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: wallai-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: wallai-kafka:9092

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: wallai-etcd
    networks:
      - wallai-net
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd --advertise-client-urls=http://wallai-etcd:2379 --listen-client-urls=http://0.0.0.0:2379 --data-dir=/etcd
    volumes:
      - etcd_data:/etcd

  minio:
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    container_name: wallai-minio
    networks:
      - wallai-net
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9001:9001"
    volumes:
      - minio_data:/minio_data

  milvus:
    image: milvusdb/milvus:v2.3.0
    container_name: wallai-milvus
    networks:
      - wallai-net
    depends_on:
      - etcd
      - minio
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: wallai-etcd:2379
      MINIO_ADDRESS: wallai-minio:9000
    command: ["milvus", "run", "standalone"]
    volumes:
      - milvus_data:/var/lib/milvus

  attu:
    image: zilliz/attu:latest
    container_name: wallai-attu
    networks:
      - wallai-net
    depends_on:
      - milvus
    ports:
      - "3000:3000"
    environment:
      MILVUS_URL: wallai-milvus:19530

  redis:
    image: redis:7.2-alpine
    container_name: wallai-redis
    networks:
      - wallai-net
    ports:
      - "6379:6379"
    command: redis-server --save 60 1
    volumes:
      - redis_data:/data

networks:
  wallai-net:
    driver: bridge

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  redis_data:
